name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: github-commit-info_x86_64-pc-windows-msvc.exe
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: github-commit-info_aarch64-unknown-linux-gnu
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: github-commit-info_x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/github-commit-info.exe dist/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/github-commit-info dist/${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: ls -la dist

      - name: Create tarballs (Linux)
        shell: bash
        run: |
          cd dist
          for f in github-commit-info_*; do
            if [[ "$f" != *.exe ]]; then
              tar -czvf "${f}.tar.gz" "$f"
              rm "$f"
            fi
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
